<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lilypad Leap (compact)</title>
<style>
  :root{
    --sky:#15122b;--sky2:#241a44;--ink:#f3eefe;--muted:#9b91c4;
    --amber:#f4b942;--amber-deep:#d9911f;--line:#3a3550;--road:#26252e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 80% at 50% -10%, var(--sky2), var(--sky) 70%);
    color:var(--ink);font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100%;user-select:none;
  }
  /* the whole app is locked to 310 x 390 */
  .app{
    width:310px;height:390px;display:flex;flex-direction:column;gap:5px;padding:7px;
    background:var(--sky);border-radius:12px;
    box-shadow:0 10px 34px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.05);
  }
  .hud{
    flex:0 0 auto;height:22px;display:flex;align-items:center;justify-content:space-between;
    font-size:11px;letter-spacing:.04em;
  }
  .hud .name{font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:11px}
  .hud .name span{color:var(--amber)}
  .hud .stats{display:flex;gap:10px;align-items:center}
  .hud .stats b{font-variant-numeric:tabular-nums}
  .hud .stats .lab{color:var(--muted);font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin-right:3px}
  .lives{display:flex;gap:3px}
  .lives i{width:8px;height:8px;border-radius:50%;background:#84cc4f;display:inline-block}
  .lives i.off{background:#3a3550}

  .timewrap{flex:0 0 auto;height:4px;background:var(--line);border-radius:4px;overflow:hidden}
  #time{height:100%;width:100%;background:linear-gradient(90deg,var(--amber),#86d04f);transition:width .1s linear}

  .stage{flex:1 1 auto;min-height:0;position:relative;display:flex;align-items:center;justify-content:center}
  canvas{display:block;max-width:100%;max-height:100%;width:auto;height:auto;
    border-radius:8px;touch-action:none;image-rendering:auto}

  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:14px;gap:9px;border-radius:8px;
    background:linear-gradient(180deg,rgba(21,18,43,.30),rgba(21,18,43,.80))}
  .overlay.hidden{display:none}
  .badge{position:absolute;top:7px;left:7px;font-size:8px;letter-spacing:.22em;color:var(--amber);
    border:1px solid rgba(244,185,66,.5);border-radius:99px;padding:2px 7px;text-transform:uppercase}
  .big{font-size:21px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;line-height:1.05}
  .big span{color:var(--amber)}
  .sub{font-size:10px;color:var(--muted);max-width:220px;line-height:1.45}
  .btn{appearance:none;border:0;cursor:pointer;font:inherit;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;font-size:12px;color:#241a06;background:var(--amber);
    padding:9px 20px;border-radius:9px;box-shadow:0 4px 0 var(--amber-deep)}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--amber-deep)}
  .hint{font-size:9px;color:var(--muted)}
</style>
</head>
<body>
<div class="app">
  <div class="hud">
    <div class="name">Lilypad <span>Leap</span></div>
    <div class="stats">
      <span><span class="lab">Sc</span><b id="score">0</b></span>
      <span><span class="lab">Best</span><b id="best">0</b></span>
      <span class="lives" id="lives"></span>
    </div>
  </div>
  <div class="timewrap"><div id="time"></div></div>
  <div class="stage">
    <canvas id="game" width="288" height="352"></canvas>
    <div class="overlay" id="overlay">
      <div class="badge" id="badge">Demo</div>
      <div class="big" id="ovTitle">Lilypad <span>Leap</span></div>
      <div class="sub" id="ovSub">Cross the road and river to the lily pads. Fill all four to clear the level.</div>
      <button class="btn" id="startBtn">Start</button>
      <div class="hint">Arrows / WASD · swipe · or tap a direction</div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const COLS=9, ROWS=11, TILE=32;
  const W=COLS*TILE, H=ROWS*TILE;
  const HOME_ROW=0, RIVER_ROWS=[1,2,3,4], MEDIAN_ROW=5, ROAD_ROWS=[6,7,8,9], START_ROW=10;
  const HOME_SLOT_COLS=[1,3,5,7];
  const START_COL=4;

  const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  const el={score:document.getElementById('score'),best:document.getElementById('best'),
    lives:document.getElementById('lives'),time:document.getElementById('time'),
    overlay:document.getElementById('overlay'),badge:document.getElementById('badge'),
    ovTitle:document.getElementById('ovTitle'),ovSub:document.getElementById('ovSub'),
    startBtn:document.getElementById('startBtn')};

  const STATE={ATTRACT:'attract',PLAY:'play',DEAD:'dead',OVER:'over'};
  let state=STATE.ATTRACT;
  let score=0,best=loadBest(),lives=3,level=1;
  let lanes=[], homes=HOME_SLOT_COLS.map(c=>({col:c,filled:false}));
  let lifeTimer=0; const LIFE_TIME=50;
  let highestRow=START_ROW, deathFx=0, demoCooldown=0, flashTimer=0;
  const frog={x:START_COL,y:START_ROW,anim:null,dead:false};

  const CAR_COLORS=['#ef5d6a','#f29e4c','#e8d44d','#b07cd6','#5ad1c8'];

  function buildLanes(lvl){
    lanes=[]; const sp=1+(lvl-1)*0.12;
    const road=[
      {row:6,dir:1,speed:54,len:1,gap:4.6,truck:false},
      {row:7,dir:-1,speed:70,len:1,gap:4.4,truck:false},
      {row:8,dir:1,speed:46,len:2,gap:5.8,truck:true},
      {row:9,dir:-1,speed:82,len:1,gap:4.9,truck:false},
    ];
    road.forEach((c,i)=>lanes.push(makeLane({type:'car',row:c.row,dir:c.dir,speed:c.speed*sp,
      objLen:c.len*TILE,gap:c.gap*TILE,color:CAR_COLORS[i%CAR_COLORS.length],truck:c.truck})));
    const river=[
      {row:4,dir:1,speed:48,len:3,gap:5.0,type:'log'},
      {row:3,dir:-1,speed:62,len:2,gap:4.2,type:'turtle'},
      {row:2,dir:1,speed:78,len:3,gap:5.2,type:'log'},
      {row:1,dir:-1,speed:54,len:2,gap:3.9,type:'turtle'},
    ];
    river.forEach(c=>lanes.push(makeLane({type:c.type,row:c.row,dir:c.dir,speed:c.speed*sp,
      objLen:c.len*TILE,gap:c.gap*TILE,color:'#8a5a3b'})));
  }
  function makeLane(cfg){
    const lane={...cfg,items:[]};
    const loopLen=Math.ceil((W+cfg.objLen)/cfg.gap)*cfg.gap + cfg.gap;
    lane.loopLen=loopLen;
    const n=Math.ceil(loopLen/cfg.gap);
    for(let i=0;i<n;i++) lane.items.push({x:i*cfg.gap});
    return lane;
  }

  function hop(dir){
    if(state!==STATE.PLAY||frog.anim) return;
    let nx=frog.x,ny=frog.y;
    if(dir==='up')ny--;else if(dir==='down')ny++;else if(dir==='left')nx--;else if(dir==='right')nx++;
    nx=Math.max(0,Math.min(COLS-1,nx)); ny=Math.max(HOME_ROW,Math.min(START_ROW,ny));
    if(nx===frog.x&&ny===frog.y) return;
    frog.anim={fromX:frog.x,fromY:frog.y,toX:nx,toY:ny,t:0,dur:0.10};
  }
  function landHop(){
    frog.x=Math.round(frog.anim.toX); frog.y=frog.anim.toY; frog.anim=null;
    if(frog.y<highestRow){ score+=10*(highestRow-frog.y); highestRow=frog.y; updateHud(); }
    if(frog.y===HOME_ROW) resolveHome();
  }
  function resolveHome(){
    const slot=homes.find(h=>h.col===Math.round(frog.x)&&!h.filled);
    if(slot){ slot.filled=true; score+=120; updateHud();
      if(homes.every(h=>h.filled)) nextLevel(); else respawn(false);
    } else die();
  }

  document.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    const m={arrowup:'up',w:'up',arrowdown:'down',s:'down',arrowleft:'left',a:'left',arrowright:'right',d:'right'};
    if(m[k]){e.preventDefault();hop(m[k]);}
    if((k===' '||k==='enter')&&state!==STATE.PLAY){e.preventDefault();startGame();}
  },{passive:false});

  let pStart=null;
  canvas.addEventListener('pointerdown',e=>{pStart={x:e.clientX,y:e.clientY};});
  canvas.addEventListener('pointerup',e=>{
    if(!pStart)return; const dx=e.clientX-pStart.x,dy=e.clientY-pStart.y; pStart=null;
    if(state!==STATE.PLAY)return;
    if(Math.abs(dx)<14&&Math.abs(dy)<14){
      const r=canvas.getBoundingClientRect();
      const sx=(e.clientX-r.left)/r.width*W, sy=(e.clientY-r.top)/r.height*H;
      const ddx=sx-(frog.x+0.5)*TILE, ddy=sy-(frog.y+0.5)*TILE;
      if(Math.abs(ddx)>Math.abs(ddy)) hop(ddx>0?'right':'left'); else hop(ddy>0?'down':'up');
    } else {
      if(Math.abs(dx)>Math.abs(dy)) hop(dx>0?'right':'left'); else hop(dy>0?'down':'up');
    }
  });
  el.startBtn.addEventListener('click',startGame);

  function startGame(){
    score=0;lives=3;level=1; homes.forEach(h=>h.filled=false);
    buildLanes(level); respawn(true); state=STATE.PLAY;
    el.overlay.classList.add('hidden'); updateHud();
  }
  function respawn(reset){
    frog.x=START_COL;frog.y=START_ROW;frog.anim=null;frog.dead=false; highestRow=START_ROW;
    if(reset!==false) lifeTimer=LIFE_TIME;
  }
  function nextLevel(){
    level++; homes.forEach(h=>h.filled=false); score+=500;
    buildLanes(level); respawn(true); updateHud();
    flash('Level '+level,'Faster now. Keep hopping.',1100);
  }
  function die(){
    if(frog.dead)return; frog.dead=true; deathFx=0.6; lives--; updateHud(); state=STATE.DEAD;
    setTimeout(()=>{ if(lives<=0) gameOver(); else { respawn(true); state=STATE.PLAY; } },650);
  }
  function gameOver(){
    if(score>best){best=score;saveBest(best);} updateHud(); state=STATE.OVER;
    el.badge.textContent='Game Over'; el.ovTitle.innerHTML='Game <span>Over</span>';
    el.ovSub.textContent='Score '+score+(score>=best?' — new best!':'. Best '+best+'.');
    el.startBtn.textContent='Play Again'; el.overlay.classList.remove('hidden');
    homes.forEach(h=>h.filled=false); buildLanes(1); respawn(true);
  }
  function flash(t,s,ms){
    el.badge.textContent='Level Up'; el.ovTitle.innerHTML=t; el.ovSub.textContent=s;
    el.startBtn.style.display='none'; el.overlay.classList.remove('hidden'); flashTimer=ms/1000;
  }
  function updateHud(){
    el.score.textContent=score; el.best.textContent=best;
    let s=''; for(let i=0;i<3;i++) s+='<i class="'+(i<lives?'':'off')+'"></i>';
    el.lives.innerHTML=s;
  }

  // demo AI
  function demoThink(dt){
    if(frog.anim)return; demoCooldown-=dt; if(demoCooldown>0)return;
    demoCooldown=0.18+Math.random()*0.12;
    const col=Math.round(frog.x);
    if(tileSafe(col,frog.y-1)){ hopDemo('up'); return; }
    if(frog.x<1.2){hopDemo('right');return;} if(frog.x>COLS-2.2){hopDemo('left');return;}
    const l=tileSafe(col-1,frog.y-1), r=tileSafe(col+1,frog.y-1);
    if(l&&(!r||Math.random()<0.5)){hopDemo('left');return;}
    if(r){hopDemo('right');return;}
  }
  function hopDemo(dir){
    if(frog.anim)return; let nx=frog.x,ny=frog.y;
    if(dir==='up')ny--;else if(dir==='down')ny++;else if(dir==='left')nx--;else if(dir==='right')nx++;
    nx=Math.max(0,Math.min(COLS-1,nx));ny=Math.max(HOME_ROW,Math.min(START_ROW,ny));
    if(nx===frog.x&&ny===frog.y)return;
    frog.anim={fromX:frog.x,fromY:frog.y,toX:nx,toY:ny,t:0,dur:0.10};
  }
  function tileSafe(col,row){
    if(col<0||col>=COLS||row<0)return false;
    if(row===MEDIAN_ROW||row===START_ROW)return true;
    if(row===HOME_ROW)return HOME_SLOT_COLS.includes(col)&&!homes.find(h=>h.col===col).filled;
    const lane=lanes.find(l=>l.row===row); if(!lane)return true;
    const cx=(col+0.5)*TILE;
    if(lane.type==='car'){
      for(const it of lane.items) if(cx>it.x-TILE*0.4&&cx<it.x+lane.objLen+TILE*0.4)return false;
      return true;
    } else {
      for(const it of lane.items) if(cx>it.x&&cx<it.x+lane.objLen)return true;
      return false;
    }
  }
  function softRespawn(){ frog.dead=true;deathFx=0.4; setTimeout(()=>{if(state!==STATE.PLAY)respawn(true);},350); }

  function update(dt){
    for(const lane of lanes){
      const d=lane.dir*lane.speed*dt;
      for(const it of lane.items){
        it.x+=d;
        if(lane.dir>0&&it.x>W+lane.objLen) it.x-=lane.loopLen;
        if(lane.dir<0&&it.x<-lane.objLen) it.x+=lane.loopLen;
      }
    }
    if(frog.anim){ frog.anim.t+=dt; if(frog.anim.t/frog.anim.dur>=1) landHop(); }

    const playing=state===STATE.PLAY;
    const demo=state===STATE.ATTRACT||state===STATE.OVER;
    if(demo) demoThink(dt);

    if(!frog.anim&&!frog.dead){
      const row=frog.y;
      if(RIVER_ROWS.includes(row)){
        const lane=lanes.find(l=>l.row===row); let on=false; const fx=(frog.x+0.5)*TILE;
        for(const it of lane.items) if(fx>it.x&&fx<it.x+lane.objLen){on=true;break;}
        if(on){ frog.x+=(lane.dir*lane.speed*dt)/TILE;
          if(frog.x<-0.4||frog.x>COLS-0.6){ playing?die():(demo&&softRespawn()); }
        } else { playing?die():(demo&&softRespawn()); }
      } else if(ROAD_ROWS.includes(row)){
        const lane=lanes.find(l=>l.row===row); const fL=frog.x*TILE+5,fR=frog.x*TILE+TILE-5;
        for(const it of lane.items) if(fR>it.x+3&&fL<it.x+lane.objLen-3){ playing?die():(demo&&softRespawn()); break; }
      }
    }
    if(playing){ lifeTimer-=dt; if(lifeTimer<=0) die();
      el.time.style.width=Math.max(0,(lifeTimer/LIFE_TIME)*100)+'%'; }
    if(deathFx>0) deathFx-=dt;
    if(flashTimer>0){ flashTimer-=dt; if(flashTimer<=0){ el.overlay.classList.add('hidden'); el.startBtn.style.display=''; } }
  }

  // ---- render ----
  function draw(){
    band(START_ROW,START_ROW,'#2f5d4e'); band(MEDIAN_ROW,MEDIAN_ROW,'#2f5d4e');
    road(); river(); home();
    for(const l of lanes) if(l.type==='car') l.items.forEach(it=>car(l,it));
    for(const l of lanes){ if(l.type==='log') l.items.forEach(it=>log(l,it));
      if(l.type==='turtle') l.items.forEach(it=>turtle(l,it)); }
    drawFrog();
  }
  function band(r0,r1,c){ ctx.fillStyle=c; ctx.fillRect(0,r0*TILE,W,(r1-r0+1)*TILE);
    ctx.fillStyle='rgba(255,255,255,.04)';
    for(let r=r0;r<=r1;r++)for(let i=0;i<8;i++) ctx.fillRect((i*41+r*13)%W,r*TILE+((i*23)%TILE),2,2); }
  function road(){ const t=ROAD_ROWS[0]*TILE,h=ROAD_ROWS.length*TILE;
    ctx.fillStyle='#26252e'; ctx.fillRect(0,t,W,h);
    ctx.strokeStyle='#5b5570';ctx.lineWidth=2;ctx.setLineDash([11,9]);
    for(let i=1;i<ROAD_ROWS.length;i++){const y=(ROAD_ROWS[0]+i)*TILE;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    ctx.setLineDash([]); ctx.fillStyle='#f4b94233'; ctx.fillRect(0,t-2,W,2);ctx.fillRect(0,t+h,W,2); }
  function river(){ const t=RIVER_ROWS[0]*TILE,h=RIVER_ROWS.length*TILE;
    const g=ctx.createLinearGradient(0,t,0,t+h);g.addColorStop(0,'#1f7c9b');g.addColorStop(1,'#155a76');
    ctx.fillStyle=g;ctx.fillRect(0,t,W,h);
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=2; const tt=performance.now()/900;
    for(let r=0;r<RIVER_ROWS.length;r++){const y=(RIVER_ROWS[0]+r)*TILE+TILE/2;ctx.beginPath();
      for(let x=0;x<=W;x+=10){const yy=y+Math.sin(x/24+tt+r)*2;x===0?ctx.moveTo(x,yy):ctx.lineTo(x,yy);}ctx.stroke();} }
  function home(){ ctx.fillStyle='#0f1f2b';ctx.fillRect(0,0,W,TILE);
    ctx.fillStyle='#234d3a';
    for(let c=0;c<COLS;c++) if(!HOME_SLOT_COLS.includes(c)){rr(c*TILE+2,3,TILE-4,TILE-7,6);ctx.fill();}
    for(const h of homes){const cx=h.col*TILE+TILE/2,cy=TILE/2;
      ctx.fillStyle=h.filled?'#3a7d44':'#1c3a2c';ctx.beginPath();ctx.arc(cx,cy,TILE*0.42,0,7);ctx.fill();
      ctx.strokeStyle=h.filled?'#84cc4f':'rgba(244,185,66,.85)';ctx.lineWidth=3;ctx.stroke();
      ctx.fillStyle='#0f1f2b';ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,TILE*0.42,-0.5,0.5);ctx.closePath();ctx.fill();
      if(h.filled) frogShape(cx,cy,TILE*0.32,'#84cc4f','#3f7a2e'); } }
  function car(l,it){ const y=l.row*TILE,x=it.x,w=l.objLen,h=TILE,p=5;
    ctx.fillStyle='rgba(0,0,0,.25)';rr(x+2,y+p+2,w-4,h-p*2,6);ctx.fill();
    ctx.fillStyle=l.color;rr(x,y+p,w,h-p*2,6);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.55)';
    if(l.truck){const cab=l.dir>0?x+w-TILE*0.66:x+TILE*0.1;rr(cab,y+p+4,TILE*0.52,h-p*2-8,3);ctx.fill();}
    else{rr(x+w*0.28,y+p+3,w*0.44,h-p*2-6,3);ctx.fill();}
    ctx.fillStyle='#fff4c2';const hl=l.dir>0?x+w-3:x+1;ctx.fillRect(hl,y+p+3,3,3);ctx.fillRect(hl,y+h-p-6,3,3); }
  function log(l,it){ const y=l.row*TILE,x=it.x,w=l.objLen,p=4;
    ctx.fillStyle='#6e4429';rr(x,y+p,w,TILE-p*2,8);ctx.fill();
    ctx.fillStyle='#8a5a3b';rr(x+2,y+p+2,w-4,TILE-p*2-5,7);ctx.fill();
    ctx.strokeStyle='rgba(60,35,20,.5)';ctx.lineWidth=2;
    for(let gx=x+9;gx<x+w-5;gx+=11){ctx.beginPath();ctx.moveTo(gx,y+p+3);ctx.lineTo(gx,y+TILE-p-3);ctx.stroke();} }
  function turtle(l,it){ const y=l.row*TILE; const n=Math.round(l.objLen/TILE);
    for(let i=0;i<n;i++){const cx=it.x+i*TILE+TILE/2,cy=y+TILE/2;
      ctx.fillStyle='#4f8a4f';ctx.beginPath();ctx.ellipse(cx,cy,TILE*0.42,TILE*0.40,0,0,7);ctx.fill();
      ctx.fillStyle='#6fae6f';ctx.beginPath();ctx.ellipse(cx,cy,TILE*0.30,TILE*0.28,0,0,7);ctx.fill();
      ctx.strokeStyle='#3c6e3c';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,TILE*0.17,0,7);ctx.stroke();
      ctx.fillStyle='#4f8a4f';const hx=l.dir>0?cx+TILE*0.34:cx-TILE*0.34;ctx.beginPath();ctx.arc(hx,cy,4,0,7);ctx.fill();} }
  function drawFrog(){
    let fx,fy,sq=1;
    if(frog.anim){const k=Math.min(1,frog.anim.t/frog.anim.dur);
      fx=frog.anim.fromX+(frog.anim.toX-frog.anim.fromX)*k; fy=frog.anim.fromY+(frog.anim.toY-frog.anim.fromY)*k;
      sq=1-Math.sin(k*Math.PI)*0.18;} else {fx=frog.x;fy=frog.y;}
    const cx=fx*TILE+TILE/2,cy=fy*TILE+TILE/2;
    if(frog.dead&&deathFx>0){ ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=3;
      const r=(0.6-deathFx)*50+6;ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.stroke();
      ctx.fillStyle='#e8516a';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText('✕',cx,cy+6);return; }
    frogShape(cx,cy,TILE*0.40,'#84cc4f','#3f7a2e',sq);
  }
  function frogShape(cx,cy,r,c,d,sq=1){
    ctx.save();ctx.translate(cx,cy);ctx.scale(1,sq);
    ctx.fillStyle=d;[[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([sx,sy])=>{
      ctx.beginPath();ctx.ellipse(sx*r*0.7,sy*r*0.7,r*0.34,r*0.5,sx*0.6,0,7);ctx.fill();});
    ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(0,0,r*0.85,r*0.78,0,0,7);ctx.fill();
    ctx.fillStyle=d;ctx.beginPath();ctx.ellipse(0,r*0.18,r*0.6,r*0.4,0,0,7);ctx.fill();
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(-r*0.42,-r*0.55,r*0.30,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(r*0.42,-r*0.55,r*0.30,0,7);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-r*0.42,-r*0.55,r*0.15,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(r*0.42,-r*0.55,r*0.15,0,7);ctx.fill();
    ctx.fillStyle='#16240c';ctx.beginPath();ctx.arc(-r*0.42,-r*0.55,r*0.07,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(r*0.42,-r*0.55,r*0.07,0,7);ctx.fill();
    ctx.restore();
  }
  function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
  function loadBest(){try{return parseInt(localStorage.getItem('lilypad_best')||'0',10)||0;}catch(e){return 0;}}
  function saveBest(v){try{localStorage.setItem('lilypad_best',v);}catch(e){}}

  let last=performance.now();
  function frame(now){let dt=(now-last)/1000;last=now;if(dt>0.05)dt=0.05;update(dt);draw();requestAnimationFrame(frame);}
  buildLanes(1);respawn(true);updateHud();el.time.style.width='100%';requestAnimationFrame(frame);
})();
</script>
